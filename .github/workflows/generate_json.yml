name: Generate Gallery JSON

# 仅当 images/** 或本文件变更时触发；改 index.html / js / css 不会跑此工作流（见 site_source_push.yml）。
# 提前使用 Node 24 运行 JS 类 Action，避免 2026 年弃用 Node 20 后踩雷（官方说明见 GitHub Actions changelog）。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: generate-json-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  schedule:
    - cron: '0 * * * *'  # 每小时运行一次
  push:
    branches:
      - main
    paths:
      - 'images/**'
      - '.github/workflows/generate_json.yml'
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r requirements.txt

      - name: 调试（仅手动 workflow_dispatch）
        if: github.event_name == 'workflow_dispatch'
        run: |
          echo "=== generate_galleries.py 前 80 行 ==="
          head -n 80 generate_galleries.py || true
          echo "=== Secrets 是否已配置（不输出值）==="
          echo "R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL != '' }}"
          echo "R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID != '' }}"
          echo "R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY != '' }}"
          echo "R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME != '' }}"
          echo "R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL != '' }}"

      - name: Run script to generate JSON
        run: |
          echo "--- 开始运行生成脚本 ---"
          python generate_galleries.py
          echo "--- 脚本执行完成 ---"
          echo "--- 检查生成的 JSON 文件 ---"
          find images -name "*.json" -type f -exec echo "Found: {}" \;
        env: # Use secrets, DO NOT HARDCODE VALUES HERE!
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_BASE_URL: ${{ secrets.R2_PUBLIC_BASE_URL }}

      - name: Commit and push changes
        # 添加 set -e，让脚本在出错时立即停止
        run: |
          set -e 
          
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          echo "--- 开始将文件添加到 Git ---"
          git add images/
          git add images/**/*.json
          
          echo "--- 添加文件后的 Git 状态 ---"
          git status
          
          echo "--- 暂存区的文件差异（显示具体更改） ---"
          # 显示实际差异，不使用 --quiet 以便调试
          git diff --staged || echo "Diff 未发现暂存区的更改。"
          
          echo "--- 检查是否存在用于提交的暂存更改 ---"
          # 直接在 if 条件里进行判断，不单独存储退出代码
          if git diff --staged --quiet; then
            echo "未检测到 JSON 文件有更改。"
          else
            echo "检测到更改，开始提交和推送..."
            git commit -m "Automated: 更新画廊 JSON 文件"
            git push origin HEAD:${{ github.ref_name }}
            echo "提交和推送完成。"
          fi
