# 当首页/脚本/样式等变更时触发，便于在 Actions 里看到「有推送」记录。
# 静态站点发布一般由 Cloudflare Pages 等托管在 push 后自动构建，本工作流不负责部署。
# Actions 版本由根目录 .github/dependabot.yml 按月提 PR 跟进。
# 注：push 不限定 main，否则 feature 分支推送不会在 Actions 里出现运行记录。
name: Site source changed

on:
  push:
    paths:
      - '**/*.html'
      - 'js/**'
      - 'css/**'
      - 'scripts/**'
      - 'images/*.json'
      - '.github/workflows/*.yml'

  pull_request:
    branches:
      - main
    paths:
      - '**/*.html'
      - 'js/**'
      - 'css/**'
      - 'scripts/**'
      - 'images/*.json'
      - '.github/workflows/*.yml'

  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Summary
        run: |
          echo "静态站点相关路径已变更（分支: ${{ github.ref_name }}，事件: ${{ github.event_name }}）。"
          echo "生产环境若未变：请到托管平台（如 Cloudflare Pages）确认生产分支与本次推送/合并一致，并查看部署记录与缓存。"
